<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pace | Sign Up</title>
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  <main class="auth-page">
    <section class="brand" aria-label="Pace">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" role="img">
          <path d="M21 7c-4 0-7 3-7 7-3 1-5 4-5 8 0 2 .8 4 2.2 5.4A8 8 0 0 0 18 40c1.2 0 2.3-.3 3.2-.8V7.1L21 7Z"></path>
          <path d="M27 7c4 0 7 3 7 7 3 1 5 4 5 8 0 2-.8 4-2.2 5.4A8 8 0 0 1 30 40c-1.2 0-2.3-.3-3.2-.8V7.1L27 7Z"></path>
          <path d="M14 17c2 .4 3.4 1.7 4 3.8M14 29c2.2-.1 3.8-1.1 4.8-3M34 17c-2 .4-3.4 1.7-4 3.8M34 29c-2.2-.1-3.8-1.1-4.8-3"></path>
        </svg>
      </div>
      <h1>Pace</h1>
    </section>

    <p class="auth-subtitle">Create your account</p>

    <form class="auth-card" id="signupForm" novalidate>
      <div class="alert" id="signupAlert" role="alert" hidden>
        <span aria-hidden="true">!</span>
        <p>Please fill in all fields</p>
      </div>

      <label class="field">
        <span>Full Name</span>
        <span class="input-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="signupName" placeholder="John Doe" autocomplete="name">
        </span>
      </label>

      <label class="field">
        <span>Email</span>
        <span class="input-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m22 7-8.9 5.7a2 2 0 0 1-2.2 0L2 7"></path>
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
          </svg>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
        </span>
      </label>

      <label class="field">
        <span>Password</span>
        <span class="input-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="11" width="14" height="10" rx="2"></rect>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
          </svg>
          <input type="password" id="signupPassword" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="new-password">
        </span>
      </label>

      <label class="field">
        <span>Confirm Password</span>
        <span class="input-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="11" width="14" height="10" rx="2"></rect>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
          </svg>
          <input type="password" id="signupConfirm" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="new-password">
        </span>
      </label>

      <button class="primary-btn" type="submit">Sign Up</button>

      <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
    </form>

    <p class="auth-note">Prototype - data stored locally in browser (Per Device)</p>
  </main>

  <script src="js/register.js"></script>
</body>
</html>
